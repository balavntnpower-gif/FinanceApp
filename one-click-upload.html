<!DOCTYPE html>
<html>
<head>
    <title>One Click Upload - HLB Finance</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin: 10px 0;
        }
        button:hover { background: #219a52; }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        .status {
            padding: 12px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 13px;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            height: 100%;
            background: #27ae60;
            width: 0%;
            transition: width 0.3s;
        }
        .hidden { display: none; }
        hr { margin: 20px 0; border: none; border-top: 1px solid #eee; }
        .file-label {
            background: #3498db;
            color: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            display: inline-block;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }
        .file-label:hover { background: #2980b9; }
        #fileName { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 One Click Upload</h1>
        <p>अपनी JSON फाइल चुनें और Supabase में अपलोड करें</p>

        <input type="text" id="username" placeholder="Username" value="hindu">
        <input type="password" id="password" placeholder="Password" value="Lion">
        
        <label class="file-label" for="jsonFile">📁 JSON फाइल चुनें</label>
        <input type="file" id="jsonFile" accept=".json" style="display:none">
        <div id="fileName"></div>
        
        <button id="uploadBtn" onclick="startUpload()">📤 अपलोड शुरू करें</button>

        <div id="progressArea" class="hidden">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div id="progressText" style="font-size:12px; color:#666;"></div>
        </div>

        <div id="resultArea"></div>

        <hr>
        <div style="font-size:11px; color:#999;">
            💡 JSON फाइल में users, loans, ledger, fines होने चाहिए
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rpzjnwovtodacmfketbv.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_kJriBmx6xHInmmm5H5CJ3w_0iWgVSbt";
        let supabaseClient = null;

        // Show selected file name
        document.getElementById('jsonFile').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name;
            document.getElementById('fileName').innerHTML = fileName ? `✅ ${fileName}` : '';
        });

        function showProgress(percent, text) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').innerHTML = text;
            document.getElementById('progressArea').classList.remove('hidden');
        }

        async function startUpload() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const fileInput = document.getElementById('jsonFile');
            const btn = document.getElementById('uploadBtn');
            const resultDiv = document.getElementById('resultArea');
            
            resultDiv.innerHTML = '';
            
            if (username !== 'hindu' || password !== 'Lion') {
                resultDiv.innerHTML = '<div class="status error">❌ गलत लॉगिन! hindu / Lion use करें</div>';
                return;
            }
            
            if (!fileInput.files.length) {
                resultDiv.innerHTML = '<div class="status error">❌ कृपया JSON फाइल चुनें!</div>';
                return;
            }
            
            btn.disabled = true;
            showProgress(5, "🔐 लॉगिन हो रहा है...");
            
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log("Supabase client created");
            } catch(e) {
                resultDiv.innerHTML = '<div class="status error">❌ Supabase error: ' + e.message + '</div>';
                btn.disabled = false;
                return;
            }
            
            showProgress(10, "📄 JSON फाइल पढ़ी जा रही है...");
            
            const file = fileInput.files[0];
            const text = await file.text();
            let jsonData;
            
            try {
                jsonData = JSON.parse(text);
                console.log("JSON parsed:", Object.keys(jsonData));
            } catch(e) {
                resultDiv.innerHTML = '<div class="status error">❌ Invalid JSON file: ' + e.message + '</div>';
                btn.disabled = false;
                return;
            }
            
            showProgress(15, "📊 डेटा प्रोसेस हो रहा है...");
            
            // Convert object to array format
            function convertToArray(obj) {
                const arr = [];
                for (let [id, data] of Object.entries(obj)) {
                    arr.push({ id: id, ...data });
                }
                return arr;
            }
            
            const usersArray = jsonData.users ? convertToArray(jsonData.users) : [];
            const loansArray = jsonData.loans ? convertToArray(jsonData.loans) : [];
            const ledgerArray = jsonData.ledger ? convertToArray(jsonData.ledger) : [];
            const finesArray = jsonData.fines ? convertToArray(jsonData.fines) : [];
            
            console.log(`Users: ${usersArray.length}, Loans: ${loansArray.length}, Ledger: ${ledgerArray.length}, Fines: ${finesArray.length}`);
            
            let totalItems = usersArray.length + loansArray.length + ledgerArray.length + finesArray.length;
            let processed = 0;
            let success = 0;
            let fail = 0;
            
            // Upload function
            async function uploadTable(tableName, dataArray, tableLabel) {
                if (dataArray.length === 0) {
                    console.log(`No data for ${tableName}`);
                    return;
                }
                
                for (let item of dataArray) {
                    try {
                        if (!item.officer_id) item.officer_id = 'Prakash';
                        const { error, data } = await supabaseClient.from(tableName).upsert(item);
                        if (error) {
                            console.error(`${tableName} error:`, error);
                            fail++;
                        } else {
                            success++;
                        }
                    } catch(e) {
                        console.error(`${tableName} exception:`, e);
                        fail++;
                    }
                    processed++;
                    let percent = 15 + (processed / totalItems) * 85;
                    showProgress(percent, `⏳ ${tableLabel}: ${success} सफल, ${fail} फेल...`);
                }
            }
            
            // Upload all tables
            await uploadTable('users', usersArray, 'Users');
            await uploadTable('loans', loansArray, 'Loans');
            await uploadTable('ledger', ledgerArray, 'Ledger');
            await uploadTable('fines', finesArray, 'Fines');
            
            showProgress(100, "✅ अपलोड पूरा!");
            
            resultDiv.innerHTML = `
                <div class="status ${fail === 0 ? 'success' : 'error'}">
                    ✅ सफल: ${success}<br>
                    ❌ फेल: ${fail}<br>
                    📊 कुल: ${totalItems}
                </div>
                <a href="https://balavntnpower-gif.github.io/FinanceApp/" target="_blank">
                    <button style="background:#27ae60; margin-top:10px;">🎯 ऐप खोलें</button>
                </a>
                <button onclick="location.reload()" style="background:#3498db; margin-top:5px;">🔄 फिर से करें</button>
            `;
            
            btn.disabled = false;
            
            if (fail === 0 && success > 0) {
                alert(`🎉 सभी ${success} items अपलोड हो गए!`);
            }
        }
    </script>
</body>
</html>
