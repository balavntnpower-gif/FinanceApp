<!DOCTYPE html>
<html>
<head>
    <title>Upload Users & Loans</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        button { background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:disabled { background: #ccc; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        pre { background: #f4f4f4; padding: 10px; overflow: auto; max-height: 200px; font-size: 12px; border-radius: 5px; }
        input { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
        h1, h3 { color: #2c3e50; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 Upload Users & Loans</h1>
        <p style="color: #666;">सिर्फ Users और Loans Supabase में अपलोड करें</p>
        
        <hr>

        <div>
            <h3>🔐 Login</h3>
            <input type="text" id="username" placeholder="Username" value="hindu">
            <input type="password" id="password" placeholder="Password" value="Lion">
            <button onclick="doLogin()">Login</button>
            <div id="loginMsg"></div>
        </div>

        <div id="uploadArea" style="display:none; margin-top:20px;">
            <h3>📂 IndexedDB से डेटा लोड करें</h3>
            <button onclick="loadData()" id="loadBtn">Load Data</button>
            
            <div id="dataInfo" style="display:none; margin-top:15px;">
                <h4>📊 डेटा प्रीव्यू:</h4>
                <pre id="preview"></pre>
                <button onclick="uploadUsersAndLoans()" id="uploadBtn">☁️ Upload to Supabase</button>
                <div id="status"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rpzjnwovtodacmfketbv.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_kJriBmx6xHInmmm5H5CJ3w_0iWgVSbt";
        let supabase = null;
        let localUsers = {};
        let localLoans = {};

        console.log("Script loaded");
        console.log("Supabase URL:", SUPABASE_URL);

        function doLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginMsg = document.getElementById('loginMsg');
            
            console.log("Login attempt:", username);
            
            if (username === 'hindu' && password === 'Lion') {
                try {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    console.log("Supabase client created");
                    loginMsg.innerHTML = '<div class="status success">✅ लॉगिन सफल!</div>';
                    document.getElementById('uploadArea').style.display = 'block';
                } catch(e) {
                    console.error("Supabase error:", e);
                    loginMsg.innerHTML = '<div class="status error">❌ Supabase error: ' + e.message + '</div>';
                }
            } else {
                loginMsg.innerHTML = '<div class="status error">❌ गलत लॉगिन! hindu / Lion use करें</div>';
            }
        }

        function loadData() {
            const statusDiv = document.getElementById('status');
            const loadBtn = document.getElementById('loadBtn');
            loadBtn.disabled = true;
            statusDiv.innerHTML = '<div class="status info">⏳ IndexedDB से डेटा लोड हो रहा है...</div>';
            
            const request = indexedDB.open('HLBFinanceDB', 1);
            
            request.onsuccess = function(event) {
                const db = event.target.result;
                const tx = db.transaction(['appData'], 'readonly');
                const store = tx.objectStore('appData');
                
                const getUsers = store.get('loan_users');
                const getLoans = store.get('loan_loans');
                
                let completed = 0;
                function checkComplete() {
                    completed++;
                    if (completed === 2) {
                        const usersCount = Object.keys(localUsers).length;
                        const loansCount = Object.keys(localLoans).length;
                        
                        document.getElementById('preview').innerHTML = JSON.stringify({
                            users: usersCount,
                            loans: loansCount
                        }, null, 2);
                        
                        document.getElementById('dataInfo').style.display = 'block';
                        statusDiv.innerHTML = `<div class="status success">✅ डेटा लोड हो गया!<br>📊 ग्राहक: ${usersCount}<br>📊 लोन: ${loansCount}</div>`;
                        loadBtn.disabled = false;
                    }
                }
                
                getUsers.onsuccess = () => { localUsers = getUsers.result || {}; checkComplete(); };
                getLoans.onsuccess = () => { localLoans = getLoans.result || {}; checkComplete(); };
            };
            
            request.onerror = function() {
                statusDiv.innerHTML = '<div class="status error">❌ IndexedDB नहीं खुल पाया!</div>';
                loadBtn.disabled = false;
            };
        }

        async function uploadUsersAndLoans() {
            const uploadBtn = document.getElementById('uploadBtn');
            const statusDiv = document.getElementById('status');
            
            uploadBtn.disabled = true;
            statusDiv.innerHTML = '<div class="status info">⏳ अपलोड हो रहा है...</div>';
            
            let success = 0;
            let fail = 0;

            // Upload users
            for (let [id, user] of Object.entries(localUsers)) {
                try {
                    if (!user.officer_id) user.officer_id = 'Prakash';
                    const { error } = await supabase.from('users').upsert({ id: id, ...user });
                    if (error) {
                        console.error('User error:', error);
                        fail++;
                    } else {
                        success++;
                    }
                } catch(e) { 
                    console.error('User exception:', e);
                    fail++; 
                }
            }

            // Upload loans
            for (let [id, loan] of Object.entries(localLoans)) {
                try {
                    if (!loan.officer_id) loan.officer_id = 'Prakash';
                    const { error } = await supabase.from('loans').upsert({ id: id, ...loan });
                    if (error) {
                        console.error('Loan error:', error);
                        fail++;
                    } else {
                        success++;
                    }
                } catch(e) { 
                    console.error('Loan exception:', e);
                    fail++; 
                }
            }

            statusDiv.innerHTML = `<div class="status ${fail > 0 ? 'error' : 'success'}">
                ✅ सफल: ${success}<br>
                ❌ फेल: ${fail}
            </div>`;
            
            uploadBtn.disabled = false;
            
            if (fail === 0 && success > 0) {
                alert(`🎉 सभी ${success} items अपलोड हो गए!`);
            }
        }
    </script>
</body>
</html>
