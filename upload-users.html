<!DOCTYPE html>
<html>
<head>
    <title>Upload Users & Loans</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        button { background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        pre { background: #f4f4f4; padding: 10px; overflow: auto; max-height: 200px; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 Upload Users & Loans Only</h1>
        
        <div>
            <h3>Login</h3>
            <input type="text" id="username" placeholder="Username" value="hindu">
            <input type="password" id="password" placeholder="Password" value="Lion">
            <button onclick="doLogin()">Login</button>
        </div>

        <div id="uploadArea" style="display:none; margin-top:20px;">
            <h3>Load from IndexedDB</h3>
            <button onclick="loadData()">Load Data</button>
            
            <div id="dataInfo" style="display:none;">
                <pre id="preview"></pre>
                <button onclick="uploadUsersAndLoans()" id="uploadBtn">Upload Users & Loans</button>
                <div id="status"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rpzjnwovtodacmfketbv.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_kJriBmx6xHInmmm5H5CJ3w_0iWgVSbt";
        let supabase = null;
        let localUsers = {};
        let localLoans = {};

        function doLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === 'hindu' && password === 'Lion') {
                supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                document.getElementById('uploadArea').style.display = 'block';
                alert('Login successful!');
            } else {
                alert('Invalid credentials! Use hindu/Lion');
            }
        }

        function loadData() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '<div class="status">Loading from IndexedDB...</div>';
            
            const request = indexedDB.open('HLBFinanceDB', 1);
            
            request.onsuccess = function(event) {
                const db = event.target.result;
                const tx = db.transaction(['appData'], 'readonly');
                const store = tx.objectStore('appData');
                
                const getUsers = store.get('loan_users');
                const getLoans = store.get('loan_loans');
                
                let completed = 0;
                function checkComplete() {
                    completed++;
                    if (completed === 2) {
                        const preview = {
                            users: Object.keys(localUsers).length,
                            loans: Object.keys(localLoans).length
                        };
                        document.getElementById('preview').innerHTML = JSON.stringify(preview, null, 2);
                        document.getElementById('dataInfo').style.display = 'block';
                        statusDiv.innerHTML = '<div class="status success">Data loaded! Ready to upload.</div>';
                    }
                }
                
                getUsers.onsuccess = () => { localUsers = getUsers.result || {}; checkComplete(); };
                getLoans.onsuccess = () => { localLoans = getLoans.result || {}; checkComplete(); };
            };
            
            request.onerror = () => {
                statusDiv.innerHTML = '<div class="status error">Failed to open IndexedDB!</div>';
            };
        }

        async function uploadUsersAndLoans() {
            const uploadBtn = document.getElementById('uploadBtn');
            const statusDiv = document.getElementById('status');
            
            uploadBtn.disabled = true;
            statusDiv.innerHTML = '<div class="status">Uploading users & loans...</div>';
            
            let success = 0;
            let fail = 0;

            // Upload users
            for (let [id, user] of Object.entries(localUsers)) {
                try {
                    if (!user.officer_id) user.officer_id = 'Prakash';
                    const { error } = await supabase.from('users').upsert({ id: id, ...user });
                    if (error) {
                        console.error('User error:', error);
                        fail++;
                    } else {
                        success++;
                    }
                } catch(e) { fail++; }
            }

            // Upload loans
            for (let [id, loan] of Object.entries(localLoans)) {
                try {
                    if (!loan.officer_id) loan.officer_id = 'Prakash';
                    const { error } = await supabase.from('loans').upsert({ id: id, ...loan });
                    if (error) {
                        console.error('Loan error:', error);
                        fail++;
                    } else {
                        success++;
                    }
                } catch(e) { fail++; }
            }

            statusDiv.innerHTML = `<div class="status ${fail > 0 ? 'error' : 'success'}">
                ✅ Users & Loans: ${success} uploaded<br>
                ❌ Failed: ${fail}
            </div>`;
            
            uploadBtn.disabled = false;
            
            if (fail === 0 && success > 0) {
                alert(`🎉 ${success} users & loans uploaded successfully!`);
            }
        }
    </script>
</body>
</html>
