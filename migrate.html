<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Click Migrate - HLB Finance</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .sub {
            color: #666;
            font-size: 13px;
            margin-bottom: 25px;
        }
        .login-box {
            background: #f0f2f5;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }
        button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 10px 0;
            transition: all 0.3s;
            width: 100%;
        }
        button:hover {
            background: #219a52;
            transform: scale(1.02);
        }
        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-primary {
            background: #27ae60;
        }
        .btn-info {
            background: #3498db;
        }
        .status {
            padding: 12px;
            border-radius: 12px;
            margin: 15px 0;
            font-size: 14px;
            text-align: center;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 24px;
            font-weight: bold;
        }
        .stat-card .label {
            font-size: 11px;
            opacity: 0.9;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            height: 100%;
            background: #27ae60;
            width: 0%;
            transition: width 0.3s;
        }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #eee;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 एक क्लिक माइग्रेट</h1>
        <div class="sub">अपना सारा डेटा Supabase Cloud में सेव करें</div>

        <!-- Login Section -->
        <div class="login-box">
            <input type="text" id="username" placeholder="यूजरनेम" value="hindu">
            <input type="password" id="password" placeholder="पासवर्ड" value="Lion">
        </div>

        <!-- Main Button -->
        <button id="startBtn" class="btn-primary" onclick="startMigration()">🚀 एक क्लिक में माइग्रेट शुरू करें</button>

        <!-- Status Area -->
        <div id="statusArea" class="hidden"></div>

        <!-- Progress Bar -->
        <div id="progressArea" class="hidden">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div id="progressText" style="font-size: 12px; color: #666; text-align: center;"></div>
        </div>

        <!-- Result Area -->
        <div id="resultArea" class="hidden"></div>

        <hr>
        <div class="status warning" style="font-size: 12px;">
            💡 <strong>क्या होगा?</strong><br>
            • IndexedDB से आपका सारा डेटा लोड होगा<br>
            • Supabase में अपने आप अपलोड हो जाएगा<br>
            • 100% automatic, एक क्लिक में!
        </div>
    </div>

    <script>
        // Supabase Config
        const SUPABASE_URL = "https://rpzjnwovtodacmfketbv.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_kJriBmx6xHInmmm5H5CJ3w_0iWgVSbt";
        let supabase = null;
        let currentUser = null;

        // Local data storage
        let localData = {
            users: {},
            loans: {},
            ledger: {},
            fines: {},
            officers: {}
        };

        function showStatus(message, type) {
            const statusArea = document.getElementById('statusArea');
            statusArea.className = `status ${type}`;
            statusArea.innerHTML = message;
            statusArea.classList.remove('hidden');
        }

        function hideStatus() {
            document.getElementById('statusArea').classList.add('hidden');
        }

        function updateProgress(percent, text) {
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('progressText').innerHTML = text;
        }

        async function startMigration() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const startBtn = document.getElementById('startBtn');
            
            // Show progress area
            document.getElementById('progressArea').classList.remove('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            hideStatus();
            
            updateProgress(5, "🔐 लॉगिन हो रहा है...");

            // Check login
            if (username !== 'hindu' || password !== 'Lion') {
                showStatus('❌ गलत लॉगिन! hindu / Lion use करें', 'error');
                updateProgress(0, "");
                return;
            }

            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                currentUser = { id: 'hindu', name: 'Admin', role: 'admin' };
                updateProgress(10, "✅ लॉगिन सफल! अब डेटा लोड हो रहा है...");
            } catch(e) {
                showStatus('❌ Supabase initialize नहीं हुआ: ' + e.message, 'error');
                updateProgress(0, "");
                return;
            }

            // Load data from IndexedDB
            updateProgress(15, "📂 IndexedDB से डेटा लोड हो रहा है...");
            
            const loaded = await loadFromIndexedDB();
            if (!loaded) {
                showStatus('❌ IndexedDB में कोई डेटा नहीं मिला! पहले ऐप use कीजिए।', 'error');
                updateProgress(0, "");
                return;
            }

            // Count data
            const usersCount = Object.keys(localData.users).length;
            const loansCount = Object.keys(localData.loans).length;
            const ledgerCount = Object.keys(localData.ledger).length;
            const finesCount = Object.keys(localData.fines).length;
            const officersCount = Object.keys(localData.officers).length;

            updateProgress(30, `📊 डेटा लोड हुआ: ${usersCount} ग्राहक, ${loansCount} लोन, ${ledgerCount} कलेक्शन`);

            // Upload to Supabase
            updateProgress(40, "☁️ Supabase में अपलोड हो रहा है...");
            
            const results = await uploadToSupabase();
            
            updateProgress(100, "✅ अपलोड पूरा!");
            
            // Show results
            const resultHtml = `
                <div class="stats">
                    <div class="stat-card"><div class="number">${results.users}</div><div class="label">ग्राहक</div></div>
                    <div class="stat-card"><div class="number">${results.loans}</div><div class="label">लोन</div></div>
                    <div class="stat-card"><div class="number">${results.ledger}</div><div class="label">कलेक्शन</div></div>
                    <div class="stat-card"><div class="number">${results.fines}</div><div class="label">फाइन</div></div>
                </div>
                <div class="status success">
                    ✅ कुल अपलोड: ${results.totalSuccess}<br>
                    ❌ फेल: ${results.totalFail}
                </div>
                <button onclick="location.reload()" style="background:#3498db; margin-top:10px;">🔄 फिर से करें</button>
                <a href="https://balavntnpower-gif.github.io/FinanceApp/" target="_blank">
                    <button style="background:#27ae60; margin-top:10px;">🎯 ऐप खोलें</button>
                </a>
            `;
            
            document.getElementById('resultArea').innerHTML = resultHtml;
            document.getElementById('resultArea').classList.remove('hidden');
            
            if (results.totalFail === 0) {
                showStatus('🎉 सभी डेटा सफलतापूर्वक Supabase में सेव हो गया!', 'success');
            } else {
                showStatus(`⚠️ ${results.totalSuccess} सफल, ${results.totalFail} फेल`, 'warning');
            }
            
            startBtn.disabled = false;
            document.getElementById('progressArea').classList.add('hidden');
        }

        function loadFromIndexedDB() {
            return new Promise((resolve) => {
                const request = indexedDB.open('HLBFinanceDB', 1);
                
                request.onerror = () => resolve(false);
                
                request.onsuccess = (event) => {
                    const db = event.target.result;
                    
                    if (!db.objectStoreNames.contains('appData')) {
                        resolve(false);
                        return;
                    }
                    
                    const transaction = db.transaction(['appData'], 'readonly');
                    const store = transaction.objectStore('appData');
                    
                    const getUsers = store.get('loan_users');
                    const getOfficers = store.get('loan_officers');
                    const getLoans = store.get('loan_loans');
                    const getLedger = store.get('loan_ledger');
                    const getFines = store.get('loan_fines');
                    
                    let completed = 0;
                    function checkComplete() {
                        completed++;
                        if (completed === 5) {
                            resolve(true);
                        }
                    }
                    
                    getUsers.onsuccess = () => { localData.users = getUsers.result || {}; checkComplete(); };
                    getOfficers.onsuccess = () => { localData.officers = getOfficers.result || {}; checkComplete(); };
                    getLoans.onsuccess = () => { localData.loans = getLoans.result || {}; checkComplete(); };
                    getLedger.onsuccess = () => { localData.ledger = getLedger.result || {}; checkComplete(); };
                    getFines.onsuccess = () => { localData.fines = getFines.result || {}; checkComplete(); };
                };
            });
        }

        async function uploadToSupabase() {
            let results = {
                users: 0, loans: 0, ledger: 0, fines: 0,
                totalSuccess: 0, totalFail: 0
            };
            
            const totalItems = Object.keys(localData.users).length + 
                             Object.keys(localData.loans).length + 
                             Object.keys(localData.ledger).length + 
                             Object.keys(localData.fines).length;
            
            let processed = 0;
            
            // Upload users
            for (let [id, item] of Object.entries(localData.users)) {
                try {
                    if (!item.officer_id) item.officer_id = 'Prakash';
                    const { error } = await supabase.from('users').upsert({ id: id, ...item });
                    if (!error) {
                        results.users++;
                        results.totalSuccess++;
                    } else {
                        results.totalFail++;
                    }
                } catch(e) {
                    results.totalFail++;
                }
                processed++;
                updateProgress(30 + (processed / totalItems) * 60, `⏳ अपलोड: ${results.totalSuccess} सफल, ${results.totalFail} फेल`);
            }
            
            // Upload loans
            for (let [id, item] of Object.entries(localData.loans)) {
                try {
                    if (!item.officer_id) item.officer_id = 'Prakash';
                    const { error } = await supabase.from('loans').upsert({ id: id, ...item });
                    if (!error) {
                        results.loans++;
                        results.totalSuccess++;
                    } else {
                        results.totalFail++;
                    }
                } catch(e) {
                    results.totalFail++;
                }
                processed++;
                updateProgress(30 + (processed / totalItems) * 60, `⏳ अपलोड: ${results.totalSuccess} सफल, ${results.totalFail} फेल`);
            }
            
            // Upload ledger
            for (let [id, item] of Object.entries(localData.ledger)) {
                try {
                    if (!item.officer_id) item.officer_id = 'Prakash';
                    const { error } = await supabase.from('ledger').upsert({ id: id, ...item });
                    if (!error) {
                        results.ledger++;
                        results.totalSuccess++;
                    } else {
                        results.totalFail++;
                    }
                } catch(e) {
                    results.totalFail++;
                }
                processed++;
                updateProgress(30 + (processed / totalItems) * 60, `⏳ अपलोड: ${results.totalSuccess} सफल, ${results.totalFail} फेल`);
            }
            
            // Upload fines
            for (let [id, item] of Object.entries(localData.fines)) {
                try {
                    if (!item.officer_id) item.officer_id = 'Prakash';
                    const { error } = await supabase.from('fines').upsert({ id: id, ...item });
                    if (!error) {
                        results.fines++;
                        results.totalSuccess++;
                    } else {
                        results.totalFail++;
                    }
                } catch(e) {
                    results.totalFail++;
                }
                processed++;
                updateProgress(30 + (processed / totalItems) * 60, `⏳ अपलोड: ${results.totalSuccess} सफल, ${results.totalFail} फेल`);
            }
            
            return results;
        }
    </script>
</body>
</html>
